<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
        <link rel="shortcut icon" href="assets/logo-web.png" type="image/x-icon">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
            <link rel="stylesheet" href="css/password-reset.css">
    <title>Recuperar contraseña</title>
</head>
<body>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-md-8 col-lg-5 col-xl-4">
                <div class="login-card p-4 shadow-lg rounded bg-white">
                    <h3 class="title mb-4">Cambiar contraseña</h3>
    
                    <form id="reset-form">
                        <div class="mb-3">
                            <label for="password" class="form-label">Nueva contraseña</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password"
                                required>
                        </div>
    
                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
                            <input type="password" class="form-control form-control-lg" id="confirmPassword"
                                name="confirmPassword" required>
                        </div>
    
                        <div class="d-grid">
                            <button class="btn btn-success btn-lg" type="submit">Actualizar</button>
                        </div>
                    </form>
    
                    <p id="message" class="text-danger mt-3 text-center" style="display: none;"></p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        <script src="js/config.js"></script>
        <script src="js/app.js"></script>
</body>
</html>
